<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Application de Quiz</h1>
    <div class="quiz-container">
        <h2 id="question">Question</h2>
        <div id="repondre">
            <button id="option1">Réponse 1</button>
            <button id="option2">Réponse 2</button>
            <button id="option3">Réponse 3</button>
            <button id="option4">Réponse 4</button>
        </div>
        <p>Temps restant: <span id="timer">60</span> secondes</p>

        <p id="result"></p>

        <button id="next-btn">Question suivante</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
